name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all .py files
        run: |
          python -m compileall -q . || (echo "Syntax errors found" && exit 1)
